      setTimeout(attachClickHandler, 200);
      return;
    }
    div.on('plotly_click', function(data) {
      var pt     = data.points[0];
      var custom = pt.customdata;
      if (!custom || !custom[0]) return;

      var group = custom[0];
      var idx   = parseInt(custom[1]);
      var src   = 'audio_files/' + group + '_' + idx + '.wav';

      var player = document.getElementById('audio-player');
      var el     = document.getElementById('audio-el');
      var label  = document.getElementById('audio-label');

      el.src            = src;
      label.textContent = group.replace(/_/g,' ') + ' #' + idx;
      player.style.display = 'block';
      el.load();
      el.play().catch(function(e) {
        label.textContent = 'Click play to hear audio';
      });
    });
  }
  // Start trying after page load
  window.addEventListener('load', attachClickHandler);
